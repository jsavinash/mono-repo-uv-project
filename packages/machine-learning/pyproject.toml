[project]
name = "machine-learning"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Avinash Nishad", email = "js.avinash.nishad@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "kagglehub>=1.0.0",
    "mlflow>=1.27.0",
    "pandas>=3.0.0",
    "protobuf==3.20.3",
    "scikit-learn>=1.8.0",
]

[project.scripts]
machine-learning = "machine_learning:main"
machine_learning_lifecycle = "machine_learning.machine_learning_lifecycle:main"
simple_linear_regression = "machine_learning.supervised_learning.regression.linear_regression.types.simple_linear_regression:main"

[tool.poe]
executor.type = "uv"

[tool.poe.tasks]
linear_regression = "python ./src/machine_learning/supervised_learning/regression/linear_regression.py"

[build-system]
requires = ["uv_build>=0.9.27,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "poethepoet>=0.40.0",
]

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.27
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: /opt/homebrew/bin/python3 -m ruff check --fix main.py tests/test_main.py tests/test_cli.py
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: /opt/homebrew/bin/python3 -m ruff format main.py tests/test_main.py tests/test_cli.py
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest-smoke
        entry: /opt/homebrew/bin/python3 -m pytest -q tests/test_main.py tests/test_cli.py
        language: system
        pass_filenames: false

# Pre-commit hooks for Python Monorepo
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files
# Update: uv run pre-commit autoupdate

repos:
  # ─── Python code quality (linter + formatter) ──────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.11
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  # ─── Python type checking ─────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        name: mypy type check
        args: [--ignore-missing-imports, --strict]
        stages: [manual]

  # ─── File & content checks ────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Basic checks
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

      # Syntax validation
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-xml

      # Python specific
      - id: check-ast
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: requirements-txt-fixer
      - id: fix-byte-order-marker
      - id: fix-encoding-pragma
        args: [--remove]

      # Security
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]

      # File structure
      - id: sort-simple-yaml
      - id: forbid-new-submodules
      - id: forbid-submodules

  # ─── Pyproject.toml validation ─────────────────────────
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject
        name: validate pyproject.toml

  # ─── TOML formatting ──────────────────────────────────
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: [--write, --indent=2, --case-indent]
        types: [shell]

  # ─── JSON formatting ──────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (json/yaml/md)
        types_or: [json, yaml, markdown]
        args: [--print-width=88, --prose-wrap=always]

  # ─── Dockerfile linting ───────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        name: lint Dockerfiles
        args: [--ignore, DL3008, --ignore, DL3013]

  # ─── Shell script linting ─────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        args: [--severity=warning]

  # ─── Security scanning ────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect secrets
        args:
          - --exclude-files
          - .*\.lock|.*\.toml|.*\.yaml|.*\.md
        exclude: uv\.lock|pyproject\.toml|.*\.md|\.env\.example

  # ─── Commit message format ────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.2
    hooks:
      - id: commitizen
        name: check commit message
        stages: [commit-msg]

  # ─── Branch protection ────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: prevent direct commits to main
        args: [--branch, main, --branch, master]
        stages: [commit]

# ═══════════════════════════════════════════════════════════════
# Centralized Dependency Version Catalog
# Python Starter Kit - Monorepo Dependency Management
# ═══════════════════════════════════════════════════════════════
#
# This is the single source of truth for dependency versions.
# Individual projects can override these in their pyproject.toml.
#
# Usage:
#   uv sync                      # Installs everything
#   uv add --dev <pkg>           # Workspace-level dev dep
#   cd apps/django-api && uv add <pkg>@<version>  # Override
# ═══════════════════════════════════════════════════════════════

[metadata]
name = "python-starter-kit-dependency-catalog"
description = "Centralized dependency version catalog for Python Starter Kit monorepo"
maintained_by = "Avinash Nishad"
version = "1.0.0"

# ─── Web Frameworks ───────────────────────────────────────────
[versions]
# Django ecosystem
django = ">=5.0,<6.0"
djangorestframework = ">=3.15.0"
django-cors-headers = ">=4.3.0"
django-filter = ">=24.1"
django-environ = ">=0.11.0"
django-extensions = ">=3.2.0"
django-health-check = ">=3.17.0"
django-redis = ">=5.4.0"
django-silk = ">=5.1.0"
django-storages = ">=1.14.0"
django-allauth = ">=0.60.0"
djangorestframework-simplejwt = ">=5.3.0"
drf-spectacular = ">=0.27.0"
django-debug-toolbar = ">=5.0.0"

# Flask ecosystem
flask = ">=3.0.0"
flask-sqlalchemy = ">=3.1.0"
flask-migrate = ">=4.0.0"
flask-cors = ">=4.0.0"
flask-jwt-extended = ">=4.6.0"
flask-marshmallow = ">=0.15.0"
flask-limiter = ">=3.6.0"
flask-mail = ">=0.9.1"
flask-redis = ">=0.4.0"
flask-login = ">=0.6.2"
flask-wtf = ">=1.2.0"

# FastAPI ecosystem
fastapi = ">=0.110.0"
uvicorn = ">=0.29.0"
httpx = ">=0.27.0"
pydantic = ">=2.6.0"
pydantic-settings = ">=2.2.0"

# Streamlit
streamlit = ">=1.35.0"
st-pages = ">=0.4.0"
streamlit-option-menu = ">=0.3.0"
streamlit-authenticator = ">=0.3.0"

# ─── Databases & ORMs ─────────────────────────────────────────
sqlalchemy = ">=2.0.0"
psycopg2-binary = ">=2.9.0"
redis = ">=5.0.0"
alembic = ">=1.13.0"
mysqlclient = ">=2.2.0"

# ─── Async & Task Queues ──────────────────────────────────────
celery = ">=5.3.0"
gunicorn = ">=21.2.0"

# ─── Serialization & Schemas ──────────────────────────────────
marshmallow = ">=3.21.0"
marshmallow-sqlalchemy = ">=0.30.0"
marshmallow-dataclass = ">=8.6.0"
webargs = ">=8.4.0"
apispec = ">=6.6.0"
apispec-webframeworks = ">=1.0.0"
wtforms = ">=3.1.0"

# ─── HTTP Clients ─────────────────────────────────────────────
requests = ">=2.31.0"
stripe = ">=7.0.0"

# ─── Data Science ─────────────────────────────────────────────
pandas = ">=2.2.0"
plotly = ">=5.20.0"
pillow = ">=10.0.0"

# ─── Utilities ────────────────────────────────────────────────
python-dotenv = ">=1.0.0"
typer = ">=0.12.0"
click = ">=8.3.1"
rich = ">=13.7.0"
sentry-sdk = ">=2.0.0"
whitenoise = ">=6.6.0"
ipython = ">=8.0.0"
werkzeug = ">=3.0.0"
typing-extensions = ">=4.11.0"

# ─── Testing ──────────────────────────────────────────────────
pytest = ">=8.0"
pytest-django = ">=4.5"
pytest-cov = ">=5.0"
pytest-randomly = ">=3.15"
pytest-timeout = ">=2.3.0"
pytest-asyncio = ">=0.24.0"
factory-boy = ">=3.3.0"
faker = ">=22.0.0"
model-bakery = ">=1.18.0"
# nox = ">=2024.0"
nox-uv = ">=1.0.0"

# ─── Code Quality ─────────────────────────────────────────────
ruff = ">=0.11.0"
mypy = ">=1.16.0"
pre-commit = ">=4.2.0"
commitizen = ">=4.8.2"
pip-audit = ">=2.7.0"
pip-licenses-cli = ">=1.0.0"

# ─── Documentation ────────────────────────────────────────────
mkdocs = ">=1.6.1"
mkdocs-material = ">=9.6.14"
mkdocs-htmlproofer-plugin = ">=1.2.0"
mkdocstrings = ">=0.25.0"
mkdocstrings-python = ">=1.10.0"
mkdocs-api-autonav = ">=0.1.0"

# ═══════════════════════════════════════════════════════════════
# Dependency Groups (for uv install)
# ═══════════════════════════════════════════════════════════════

# These groups correspond to [dependency-groups] in pyproject.toml
# Use: uv sync --group <name>

[groups.django]
description = "Django REST API dependencies"
packages = [
    "django", "djangorestframework", "django-cors-headers",
    "django-filter", "django-environ", "django-extensions",
    "django-health-check", "django-redis", "django-silk",
    "django-storages", "django-allauth", "djangorestframework-simplejwt",
    "drf-spectacular", "celery", "gunicorn", "psycopg2-binary",
    "whitenoise",
]

[groups.flask]
description = "Flask REST API dependencies"
packages = [
    "flask", "flask-sqlalchemy", "flask-migrate", "flask-cors",
    "flask-jwt-extended", "flask-marshmallow", "flask-limiter",
    "flask-mail", "flask-redis", "celery", "gunicorn",
    "psycopg2-binary", "marshmallow", "marshmallow-sqlalchemy",
    "webargs", "apispec", "apispec-webframeworks",
]

[groups.frontend]
description = "Streamlit frontend dependencies"
packages = [
    "streamlit", "pandas", "plotly", "httpx",
    "pydantic-settings", "st-pages", "streamlit-option-menu",
    "streamlit-authenticator", "pillow",
]

[groups.shared]
description = "Shared library dependencies"
packages = ["pydantic"]

[groups.test]
description = "Testing dependencies"
packages = [
    "pytest", "pytest-cov", "pytest-randomly", "pytest-timeout",
    "factory-boy", "faker", "nox-uv",
]

[groups.lint]
description = "Linting dependencies"
packages = ["ruff"]

[groups.type_check]
description = "Type checking dependencies"
packages = ["mypy"]

[groups.docs]
description = "Documentation dependencies"
packages = [
    "mkdocs", "mkdocs-material", "mkdocs-htmlproofer-plugin",
    "mkdocstrings", "mkdocstrings-python", "mkdocs-api-autonav",
]

[groups.dev]
description = "Development dependencies"
packages = ["pre-commit", "commitizen", "ipython", "pip-audit"]

[groups.licenses]
description = "License compliance dependencies"
packages = ["pip-licenses-cli"]

# ═══════════════════════════════════════════════════════════════
# How to Override for Individual Projects
# ═══════════════════════════════════════════════════════════════
#
# To use a DIFFERENT version in a specific project, simply add
# the dependency with the desired version in that project's
# pyproject.toml. uv will use the project-local version.
#
# Example (in apps/my-service/pyproject.toml):
#   [project]
#   dependencies = [
#       "django==5.2.0",  # Override central version
#   ]
#
# Example (add a new dependency):
#   cd apps/my-service
#   uv add new-package@latest
#
# Example (upgrade a central dependency):
#   # Update this file, then re-sync
#   uv sync --all-workspace